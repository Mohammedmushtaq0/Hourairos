receivers:
  filelog:
    include:
      - /logs/app.log

  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  debug:

  otlphttp/loki:
    endpoint: http://loki:3100/otlp

  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  pipelines:
    logs:
      receivers: [filelog]
      exporters: [debug, otlphttp/loki]

    traces:
      receivers: [otlp]
      exporters: [debug, otlp/tempo]