services:

  hourairos:
    build: .
    container_name: hourairos

    ports:
      - "3000:3000"
      - "9464:9464"

    env_file:
      - .env

    volumes:
      - ./uploads:/app/uploads
      - ./extracted:/app/extracted

    depends_on:
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector

    command:
      - --config=/etc/otelcol-contrib/config.yaml

    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
      - ./logs:/logs

    depends_on:
      - tempo
      - loki

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - hourairos

  loki:
    image: grafana/loki:latest
    container_name: loki

    ports:
      - "3100:3100"

    command:
      - -config.file=/etc/loki/local-config.yaml

    volumes:
      - ./observability/loki-config.yml:/etc/loki/local-config.yaml

  tempo:
    image: grafana/tempo:latest
    container_name: tempo

    command:
      - -config.file=/etc/tempo.yaml

    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana

    ports:
      - "3001:3000"

    depends_on:
      - prometheus
      - loki
      - tempo